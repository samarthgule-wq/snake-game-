<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake | Menu</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="landing" aria-label="Snake menu">
      <section class="landingCard">
        <div class="menuTitle" data-text="SNAKE">SNAKE</div>
        <div class="menuSubtitle">Classic arcade mode</div>
        <div class="menuMeta">
          <div>Highest Score: <strong id="highScore">0</strong></div>
        </div>
        <div class="menuButtons">
          <button id="btnStart" class="btn retroBtn" type="button">Start</button>
          <button id="btnResetHigh" class="btn retroBtn" type="button">Reset High Score</button>
          <button id="btnExit" class="btn retroBtn" type="button">Exit</button>
        </div>
        <div id="menuHint" class="menuHint" aria-live="polite"></div>
        <div class="help">
          Controls in game: arrows/WASD. Pause: Space. Restart: R.
        </div>
      </section>
    </main>

    <script type="module" src="/landing.js"></script>
  </body>
</html>
